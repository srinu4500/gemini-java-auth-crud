<div style="text-align: center; background-color: #28a745; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;">
  <h1 style="font-size: 3rem; margin-bottom: 2rem;">Welcome Srinu</h1>
  <div style="display: flex; gap: 20px;">
    <button routerLink="/login" style="padding: 15px 40px; font-size: 1.2rem; background-color: white; color: #28a745; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Login</button>
    <button routerLink="/register" style="padding: 15px 40px; font-size: 1.2rem; background-color: white; color: #28a745; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Register</button>
  </div>
  <div style="margin-top: 50px;">
    <button (click)="logout()" style="padding: 8px 16px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer;">Logout</button>
  </div>
</div>
